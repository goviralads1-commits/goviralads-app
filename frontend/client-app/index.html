<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Primary Meta Tags -->
    <title>Go Viral Ads</title>
    <meta name="title" content="Go Viral Ads" />
    <meta name="description" content="Go Viral Ads - Professional social media marketing and task management platform" />
    <meta name="keywords" content="social media marketing, viral ads, task management, digital marketing, social promotion" />
    <meta name="author" content="Go Viral Ads" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#5B5BFF" />
    <meta name="msapplication-TileColor" content="#5B5BFF" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/gva-icon-192.png" />
    <link rel="apple-touch-icon" href="/gva-icon-192.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://goviralads.com/" />
    <meta property="og:title" content="Go Viral Ads" />
    <meta property="og:description" content="Professional social media marketing and task management platform" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://goviralads.com/" />
    <meta property="twitter:title" content="Go Viral Ads" />
    <meta property="twitter:description" content="Professional social media marketing and task management platform" />
    <meta property="twitter:image" content="/og-image.png" />
    
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Go Viral" />
    
    <!-- Preconnect to API -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Static preloader: visible instantly until React mounts -->
      <div id="static-preloader" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8fafc;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif">
        <div style="text-align:center">
          <div style="width:56px;height:56px;background:linear-gradient(135deg,#6366f1 0%,#4f46e5 100%);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 24px rgba(99,102,241,0.3)">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div style="width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px"></div>
          <p style="color:#64748b;font-size:13px;margin:0;font-weight:500">Loading...</p>
        </div>
      </div>
      <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
