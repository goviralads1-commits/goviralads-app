<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Primary Meta Tags -->
    <title>Go Viral Ads</title>
    <meta name="title" content="Go Viral Ads" />
    <meta name="description" content="Go Viral Ads - Professional social media marketing and task management platform" />
    <meta name="keywords" content="social media marketing, viral ads, task management, digital marketing, social promotion" />
    <meta name="author" content="Go Viral Ads" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#5B5BFF" />
    <meta name="msapplication-TileColor" content="#5B5BFF" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/gva-icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/gva-icon-192.png" />
    <link rel="apple-touch-icon" href="/gva-icon-192.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://goviralads.com/" />
    <meta property="og:title" content="Go Viral Ads" />
    <meta property="og:description" content="Professional social media marketing and task management platform" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://goviralads.com/" />
    <meta property="twitter:title" content="Go Viral Ads" />
    <meta property="twitter:description" content="Professional social media marketing and task management platform" />
    <meta property="twitter:image" content="/og-image.png" />
    
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Go Viral" />
    
    <!-- Preconnect to API -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>

    <div id="root"></div>
